<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Beatster — inloggen…</title>
</head>
<body>
  <p id="status">Even geduld, je wordt ingelogd…</p>

  <script>
    const CLIENT_ID    = '309da8555b664edbb2a8966f772ebf14';
    const REDIRECT_URI = 'https://jklunder.github.io/beatster/callback.html';

    async function exchangeCode() {
      // Spotify sends ?code=... after PKCE login
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const error  = params.get('error');

      if (error) {
        document.getElementById('status').textContent = '❌ Inloggen geannuleerd: ' + error;
        return;
      }

      if (!code) {
        document.getElementById('status').textContent = '❌ Geen autorisatiecode ontvangen.';
        return;
      }

      const verifier = sessionStorage.getItem('pkce_verifier');
      if (!verifier) {
        document.getElementById('status').textContent = '❌ PKCE verifier ontbreekt. Probeer opnieuw in te loggen.';
        return;
      }

      // Exchange the code for an access token — no backend needed, PKCE is client-side
      const response = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code:          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        })
      });

      const data = await response.json();

      if (data.access_token) {
        localStorage.setItem('access_token',  data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        localStorage.setItem('token_expiry',  Date.now() + data.expires_in * 1000);
        sessionStorage.removeItem('pkce_verifier');
        window.location.href = 'https://jklunder.github.io/beatster/';
      } else {
        document.getElementById('status').textContent =
          '❌ Token uitwisseling mislukt: ' + JSON.stringify(data);
      }
    }

    exchangeCode();
  </script>
</body>
</html>
